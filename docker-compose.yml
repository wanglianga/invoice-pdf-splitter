services:
  invoice-splitter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoice-splitter
    image: invoice-pdf-splitter:latest
    ports:
      - "1420:1420"
    volumes:
      - ./output:/app/output
      - ./src-tauri/target:/app/src-tauri/target
    environment:
      - NODE_ENV=production
      - TARGET=release
    command: bash -c "echo 'Docker build environment ready' && tail -f /dev/null"
    stdin_open: true
    tty: true

  # 可选：Web 预览服务（开发模式）
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: invoice-splitter-web
    ports:
      - "1420:1420"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./package.json:/app/package.json
    command: npm run dev
    environment:
      - VITE_HOST=0.0.0.0
    working_dir: /app
